<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buy Vehicles | ReRide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0a1f58] text-[#f9efec] min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="bg-[#f9efec] shadow-md">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <img src="Reride_Logo.png" class="h-10">
  </div>
</nav>

<div class="flex-1">
  <div class="max-w-7xl mx-auto px-6 py-10 flex gap-10">

    <!-- FILTER SIDEBAR -->
    <aside class="w-72 bg-[#081740] rounded-xl p-6 space-y-8 h-fit sticky top-10">

      <h2 class="text-lg font-bold border-b border-gray-600 pb-3">Filters</h2>

      <!-- Vehicle Type -->
      <div>
        <h3 class="font-semibold mb-3">Vehicle Type</h3>
        <div id="typeFilter" class="space-y-2 text-sm"></div>
      </div>

      <!-- Brand -->
      <div>
        <h3 class="font-semibold mb-3">Brand</h3>
        <div id="brandFilter" class="space-y-2 text-sm"></div>
      </div>

      <!-- Colour -->
      <div>
        <h3 class="font-semibold mb-3">Colour</h3>
        <div id="colourFilter" class="space-y-2 text-sm"></div>
      </div>

      <!-- Price -->
      <div>
        <h3 class="font-semibold mb-3">Price Range</h3>

        <div class="flex justify-between text-sm mb-2">
          <span id="priceMinLabel"></span>
          <span id="priceMaxLabel"></span>
        </div>

        <input type="range" id="minPriceRange"
          min="20000" max="300000" step="5000"
          class="w-full accent-blue-500">

        <input type="range" id="maxPriceRange"
          min="20000" max="300000" step="5000"
          class="w-full accent-blue-500 mt-3">
      </div>

      <!-- Year -->
      <div>
        <h3 class="font-semibold mb-3">Year</h3>
        <select id="yearFilter"
          class="w-full p-2 rounded text-black text-sm">
          <option value="">All Years</option>
        </select>
      </div>

      <!-- Sort -->
      <div>
        <h3 class="font-semibold mb-3">Sort By</h3>
        <select id="sortOption"
          class="w-full p-2 rounded text-black text-sm">
          <option value="">None</option>
          <option value="priceLow">Price: Low to High</option>
          <option value="priceHigh">Price: High to Low</option>
          <option value="yearNew">Newest First</option>
          <option value="yearOld">Oldest First</option>
        </select>
      </div>

    </aside>

    <!-- VEHICLE GRID -->
    <section class="flex-1">
      <div id="bikeList"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      </div>

      <div class="text-center mt-12">
        <button id="loadMoreBtn"
          class="bg-[#f9efec] text-[#0a1f58] px-8 py-3 rounded-lg font-semibold hidden">
          Load More
        </button>
      </div>
    </section>

  </div>
</div>

<script src="buy1.js"></script>
</body>
</html>
